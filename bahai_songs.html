<html>

<head>

    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js"></script>
    <script src="helper.js"></script>
    <script src="data.js"></script>
    <link rel="stylesheet" href="bahai_songs.css">

</head>

<body onkeydown="keyPress(event.key)">

    <div id="mainMenu" class="hide"></div>
    <div id="contentDiv"></div>
    <footer class="footer" id="footer">
        <button id="mainMenuPlaylistStartBtn" onclick="playlistStart()">Playlist Mode</button>
        <button id="mainMenuPlaylistCreateBtn" onclick="playlistCreateStart()">Create Playlist</button>
        <button id="mainMenuPlaylistFinishBtn" onclick="playlistCreateFinish()">Save Playlist</button>
        <button id="mainMenuPlaylistBack" onclick="playlistAdvance(-1)"><</button>
        <button id="mainMenuReturnHomeBtn" onclick="returnHome()">Home</button>
        <button id="mainMenuPlaylistForward" onclick="playlistAdvance(1)">></button>
    </footer>

    <script>pageLoad()</script>

</body>

</html>
